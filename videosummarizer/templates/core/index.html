{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="card">
    <h1> ASUMMARIZE</h1>
    <p>YouTube Video Summarizer: Enter a URL below to get an instant transcript and summary via Groq API.</p>

    <form method="POST" action="{% url 'summarize' %}">
        {% csrf_token %}
        <input type="text" name="youtube_url" placeholder="Paste YouTube video link here..." required>
        <br>
        <button type="submit"> Summarize Video</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <div class="footer">
        <p> Powered by Django & Groq</p>
    </div>
</div>
{% endblock %}
