schemaVersion: 1.1
type: service
name: Assumarize
description: Video Summarizer App
spec:
  build:
    docker:
      dockerfile: Dockerfile
      context: .
  run:
    ports:
      - name: http
        port: 8080
        protocol: http
  endpoints:
    - name: web-app
      port: 8080
      type: REST
      networkVisibility: Public
      context: /
